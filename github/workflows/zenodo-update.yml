name: Update Zenodo DOI Badge

on:
  release:
    types: [published]
  workflow_dispatch:  # Manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get latest Zenodo DOI
        id: zenodo
        run: |
          # Fetch the latest Zenodo record for this repository
          RESPONSE=$(curl -s "https://zenodo.org/api/records/?q=conceptrecid:${ZENODO_CONCEPT_ID}")
          DOI=$(echo $RESPONSE | jq -r '.hits.hits[0].metadata.doi')
          echo "doi=$DOI" >> $GITHUB_OUTPUT
          
          # Construct badge URL
          BADGE_URL="https://zenodo.org/badge/DOI/${DOI}.svg"
          echo "badge_url=$BADGE_URL" >> $GITHUB_OUTPUT
        env:
          ZENODO_CONCEPT_ID: ${{ secrets.ZENODO_CONCEPT_ID }}
          
      - name: Update README with DOI badge
        run: |
          # Replace DOI badge in README
          sed -i "s|https://zenodo.org/badge/DOI/[^)]*|https://zenodo.org/badge/DOI/${{ steps.zenodo.outputs.doi }}|g" README.md
          
          # Also update the DOI link
          sed -i "s|https://doi.org/[0-9]*\.[0-9]*/zenodo\.[0-9]*|https://doi.org/${{ steps.zenodo.outputs.doi }}|g" README.md
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: update Zenodo DOI to ${{ steps.zenodo.outputs.doi }}"
          title: "Update Zenodo DOI badge"
          branch: "ci/update-zenodo-doi"
          body: |
            ## Automated DOI Update
            
            This PR updates the Zenodo DOI badge in README.md to the latest version.
            
            **New DOI:** ${{ steps.zenodo.outputs.doi }}
            
            Please review and merge to ensure the citation link is current.
          labels: "automated, documentation"
